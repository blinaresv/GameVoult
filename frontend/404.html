<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — GameVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #05070d;
      --cyan: #00e5ff;
      --violet: #a855f7;
      --magenta: #ec4899;
      --text: #e6eaf2;
      --text-2: #8a94ac;
      --border: rgba(255,255,255,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      background-image:
        radial-gradient(1200px 600px at 10% -10%, rgba(0,229,255,0.12), transparent 60%),
        radial-gradient(900px 500px at 100% 10%, rgba(168,85,247,0.12), transparent 55%),
        radial-gradient(700px 500px at 50% 110%, rgba(236,72,153,0.08), transparent 55%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at 50% 50%, #000 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      text-align: center;
      max-width: 540px;
      padding: 48px 32px;
      background: linear-gradient(180deg, rgba(20,28,46,0.75), rgba(13,19,32,0.75));
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.6);
    }

    .wrap::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), rgba(168,85,247,0.5), transparent);
    }

    .code {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: clamp(5rem, 22vw, 9rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -4px;
      background: linear-gradient(110deg, #fff 0%, var(--cyan) 35%, var(--violet) 75%, var(--magenta) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 8px 40px rgba(0,229,255,0.35));
      animation: shimmer 5s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { filter: drop-shadow(0 8px 32px rgba(0,229,255,0.30)); }
      50%  { filter: drop-shadow(0 8px 40px rgba(168,85,247,0.35)); }
      100% { filter: drop-shadow(0 8px 48px rgba(236,72,153,0.30)); }
    }

    h1 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.75rem);
      font-weight: 700;
      margin: 12px 0 10px;
      letter-spacing: -0.3px;
    }

    p {
      color: var(--text-2);
      font-size: 15px;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      color: #061018;
      padding: 13px 28px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
      box-shadow: 0 8px 22px rgba(0,229,255,0.3), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,229,255,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
      filter: brightness(1.05);
    }

    .brand {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .brand span {
      background: linear-gradient(90deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">🎮 <span>GameVault</span></div>
    <div class="code">404</div>
    <h1>Game Over · Página no encontrada</h1>
    <p>Esta pantalla no está en tu biblioteca. Quizá el enlace está roto o el juego terminó.</p>
    <a class="btn" href="/">← Volver al inicio</a>
  </main>
</body>
</html>
