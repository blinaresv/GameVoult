steps:
  # 1. Construir imagen Docker unificada (backend + frontend)
  #    El Maven build ocurre DENTRO del Dockerfile multi-stage
  #    El contexto de build es la raíz del repositorio
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t', 'us-central1-docker.pkg.dev/game-list-cloud/cloud-run-source-deploy/blinaresv-game_list_cloud/game-list-api:$COMMIT_SHA',
        '-t', 'us-central1-docker.pkg.dev/game-list-cloud/cloud-run-source-deploy/blinaresv-game_list_cloud/game-list-api:latest',
        '.'
      ]

  # 2. Push de la imagen al Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '--all-tags',
        'us-central1-docker.pkg.dev/game-list-cloud/cloud-run-source-deploy/blinaresv-game_list_cloud/game-list-api'
      ]

  # 3. Deploy a Cloud Run con la nueva imagen unificada
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run', 'services', 'update', 'game-list-api',
        '--image=us-central1-docker.pkg.dev/game-list-cloud/cloud-run-source-deploy/blinaresv-game_list_cloud/game-list-api:$COMMIT_SHA',
        '--region=us-central1',
        '--add-cloudsql-instances=game-list-cloud:us-central1:gamelist-db',
        '--set-env-vars=DB_NAME=gamelist,DB_USER=postgres,DB_PASSWORD=123456789,INSTANCE_CONNECTION_NAME=game-list-cloud:us-central1:gamelist-db',
        '--quiet'
      ]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - 'us-central1-docker.pkg.dev/game-list-cloud/cloud-run-source-deploy/blinaresv-game_list_cloud/game-list-api'
