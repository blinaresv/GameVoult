name: 🤖 Kanban Automation

on:
  issues:
    types: [opened, assigned, closed]
  pull_request:
    types: [opened, ready_for_review, closed]

jobs:
  # ── Cuando se abre un issue → moverlo a "Ready" ────────────
  issue-opened:
    name: Issue abierto → Ready
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Mover a Ready
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            console.log(`Issue #${issue.number} abierto: ${issue.title}`);
            // El movimiento de columna en GitHub Projects v2
            // se hace vía GraphQL (ver script completo abajo)

  # ── Cuando se asigna un issue → "In Progress" ──────────────
  issue-assigned:
    name: Issue asignado → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    steps:
      - name: Mover a In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const query = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $valueId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $valueId }
                }) { projectV2Item { id } }
              }
            `;
            console.log(`Issue #${context.payload.issue.number} asignado → In Progress`);

  # ── Cuando se abre un PR → "Review" ────────────────────────
  pr-opened:
    name: PR abierto → Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    steps:
      - name: Comentar en el PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👀 PR en revisión\n\n**Rama:** \`${context.payload.pull_request.head.ref}\`\n\nEste PR está pendiente de code review. Por favor revisa los cambios antes de hacer merge.\n\n_Automation: GameVault CI_`
            });

  # ── Cuando se hace merge de un PR → "Done" ─────────────────
  pr-merged:
    name: PR merged → Done
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Comentar merge exitoso
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Merge completado\n\n**${pr.title}** fue mergeado a \`${pr.base.ref}\`.\n\nLa historia de usuario asociada pasa a **Done** en el tablero Kanban.\n\n_Automation: GameVault CI_`
            });

      - name: Auto-cerrar issue relacionado
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            // Buscar "closes #N" en el cuerpo del PR
            const matches = body.match(/closes?\s+#(\d+)/gi) || [];
            for (const match of matches) {
              const issueNum = parseInt(match.replace(/\D/g, ''));
              if (issueNum) {
                console.log(`Cerrando issue #${issueNum}`);
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNum,
                  state: 'closed'
                });
              }
            }